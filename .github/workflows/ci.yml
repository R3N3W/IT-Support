name: CI

# Verification only: typecheck, lint, test. This workflow NEVER deploys, runs
# database migrations, or touches secrets. The isolation suite skips when no
# SUPABASE_SERVICE_ROLE_KEY is present (none is configured here by design).

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test
